<!DOCTYPE html>
<html>
<head>
  <title>Modpack Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Modpack Builder</h1>

<div class="controls">
  <input id="search" placeholder="Buscar mod..." />
  
  <select id="version">
    <option value="1.20.1">1.20.1</option>
    <option value="1.19.2">1.19.2</option>
  </select>

  <select id="loader">
    <option value="fabric">Fabric</option>
    <option value="forge">Forge</option>
  </select>

  <button onclick="buscar()">Buscar</button>
</div>

<div id="results"></div>

<h2>Modpack</h2>
<ul id="modpack"></ul>

<button onclick="baixar()">Baixar ZIP</button>

<script src="app.js"></script>
</body>
</html>
